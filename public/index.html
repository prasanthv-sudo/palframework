<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AILA — Adaptive AI Literacy Assessment System</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=IBM+Plex+Mono:wght@400;600&family=Source+Serif+4:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body { background: #070E1A; color: #E0E8F4; font-family: 'Source Serif 4', Georgia, serif; }
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: #0A1525; }
    ::-webkit-scrollbar-thumb { background: #1E3A5F; border-radius: 3px; }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(18px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.4; }
    }
    @keyframes barGrow {
      from { width: 0; }
    }
    @keyframes scoreCount {
      from { opacity: 0; transform: scale(0.8); }
      to   { opacity: 1; transform: scale(1); }
    }
    @keyframes shimmer {
      0%   { background-position: -200% center; }
      100% { background-position: 200% center; }
    }

    .fade-up { animation: fadeUp 0.45s ease both; }
    .fade-up-1 { animation: fadeUp 0.45s 0.05s ease both; }
    .fade-up-2 { animation: fadeUp 0.45s 0.12s ease both; }
    .fade-up-3 { animation: fadeUp 0.45s 0.20s ease both; }
    .fade-up-4 { animation: fadeUp 0.45s 0.28s ease both; }
    .fade-up-5 { animation: fadeUp 0.45s 0.36s ease both; }

    .btn-primary {
      background: linear-gradient(135deg, #0077B6, #023E8A);
      border: none; border-radius: 10px; padding: 15px 40px;
      color: #fff; font-size: 17px; font-weight: 600;
      cursor: pointer; font-family: 'Playfair Display', serif;
      box-shadow: 0 4px 24px rgba(0,119,182,0.35);
      transition: transform 0.15s, box-shadow 0.15s;
      letter-spacing: 0.3px;
    }
    .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 7px 32px rgba(0,119,182,0.5); }
    .btn-primary:active { transform: translateY(0); }

    .btn-ghost {
      background: transparent; border: 2px solid #2A4A7A;
      border-radius: 10px; padding: 13px 36px;
      color: #7BAFD4; font-size: 16px; font-weight: 600;
      cursor: pointer; font-family: 'Playfair Display', serif;
      transition: border-color 0.2s, color 0.2s, background 0.2s;
    }
    .btn-ghost:hover { border-color: #7BAFD4; color: #fff; background: rgba(123,175,212,0.08); }

    .mono { font-family: 'IBM Plex Mono', monospace; font-style: normal; }
    .serif { font-family: 'Playfair Display', serif; }

    .card {
      background: rgba(255,255,255,0.035);
      border: 1px solid rgba(255,255,255,0.07);
      border-radius: 16px;
    }

    .axis-bar { animation: barGrow 1s ease both; }
    .score-num { animation: scoreCount 0.5s ease both; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef, useCallback } = React;

    // ════════════════════════════════════════════
    // AILA SCORING ENGINE — CORE ALGORITHMS
    // ════════════════════════════════════════════

    function irt3PL(theta, a, b, c) {
      return c + (1 - c) / (1 + Math.exp(-1.7 * a * (theta - b)));
    }
    function updateTheta(theta, correct, a, b, c) {
      const p = irt3PL(theta, a, b, c);
      const delta = correct ? 0.28 * (1 - p) : -0.28 * p;
      return Math.max(-3, Math.min(3, theta + delta));
    }
    function bspWeight(latencyMs, corrections, hesitations) {
      let w = 1.0;
      if (latencyMs > 20000) w -= 0.18;
      else if (latencyMs > 10000) w -= 0.08;
      if (corrections > 1) w -= 0.10;
      if (hesitations > 2) w -= 0.08;
      return Math.max(0.60, Math.min(1.0, w));
    }
    function thetaToScore(theta) {
      return Math.round(((theta + 3) / 6) * 100);
    }
    function computeLFV(axisScores, bspWeights) {
      return axisScores.map((s, i) => Math.round(s * bspWeights[i]));
    }
    function getGrade(score) {
      if (score >= 80) return { label: "Expert",       color: "#4CAF50", bg: "rgba(76,175,80,0.12)" };
      if (score >= 65) return { label: "Proficient",   color: "#42A5F5", bg: "rgba(66,165,245,0.12)" };
      if (score >= 50) return { label: "Developing",   color: "#FFA726", bg: "rgba(255,167,38,0.12)" };
                       return { label: "Foundational", color: "#EF5350", bg: "rgba(239,83,80,0.12)" };
    }

    // ════════════════════════════════════════════
    // DATA — AXES & ITEM BANK
    // ════════════════════════════════════════════
    const AXES = [
      { id:"A1", name:"Source Provenance Assessment",   short:"Provenance", color:"#0096C7", light:"rgba(0,150,199,0.12)",  dark:"rgba(0,150,199,0.22)", icon:"🔍" },
      { id:"A2", name:"Algorithmic Rhetoric Recognition", short:"Rhetoric",   color:"#9C27B0", light:"rgba(156,39,176,0.12)", dark:"rgba(156,39,176,0.22)", icon:"🗣️" },
      { id:"A3", name:"Synthetic Media Detection",       short:"Deepfake",    color:"#E53935", light:"rgba(229,57,53,0.12)",  dark:"rgba(229,57,53,0.22)",  icon:"🎭" },
      { id:"A4", name:"Epistemic Calibration",           short:"Calibration", color:"#2E7D32", light:"rgba(46,125,50,0.12)",  dark:"rgba(46,125,50,0.22)",  icon:"⚖️" },
      { id:"A5", name:"AI Governance Literacy",          short:"Governance",  color:"#E65100", light:"rgba(230,81,0,0.12)",   dark:"rgba(230,81,0,0.22)",   icon:"🏛️" },
    ];

    const ITEM_BANK = [
      // ── A1 Source Provenance ──
      { id:"A1_1", axis:0, a:1.2, b:-1.0, c:0.2,
        stimulus:"Which clue MOST suggests the following text may be AI-generated?",
        content:`"Scientists have discovered that regular exercise improves cognitive function. Studies show benefits across all age groups. Experts recommend 150 minutes of moderate activity weekly for optimal brain health."`,
        options:["The paragraph uses scientific terminology","The writing is unusually smooth and generic with no specific citations, dates, or named researchers","It recommends 150 minutes of exercise","It mentions multiple age groups"],
        correct:1, explanation:"AI-generated text is often fluent but conspicuously vague — lacking named sources, dates, or specific institutional affiliations that genuine journalism or research contains." },

      { id:"A1_2", axis:0, a:1.5, b:0.2, c:0.15,
        stimulus:"A social media post claims a viral video was recorded 'yesterday.' What is the BEST first step to verify its origin?",
        content:null,
        options:["Check how many likes and shares it has","Read all comments to see what others think","Use reverse image/video search to find the earliest known upload","Check if the account has many followers"],
        correct:2, explanation:"Reverse image/video search (Google Images, TinEye, InVID) finds the earliest upload date and original context — the gold standard for media provenance verification." },

      { id:"A1_3", axis:0, a:1.8, b:0.8, c:0.1,
        stimulus:"An AI chatbot cites 'Smith et al. (2023)' for a medical claim. You cannot find this paper anywhere. What does this MOST likely indicate?",
        content:null,
        options:["The paper is behind a paywall","You are searching incorrectly","The AI has hallucinated a fabricated citation","The paper was retracted after publication"],
        correct:2, explanation:"AI language models frequently 'hallucinate' plausible-sounding but entirely fictional citations. An inability to find a cited paper in Scopus, WoS, or Google Scholar strongly suggests fabrication." },

      { id:"A1_4", axis:0, a:2.0, b:1.5, c:0.1,
        stimulus:"Which combination of features MOST strongly indicates a text was produced by an LLM rather than a human expert?",
        content:`"The implications of this policy shift are multifaceted. Stakeholders across sectors may experience varied outcomes depending on their specific circumstances. Further research is warranted to assess long-term effects."`,
        options:["Use of 'multifaceted' and 'stakeholders'","Hedged, generic conclusion with no specific data, named institutions, or concrete falsifiable predictions","The sentence length and paragraph structure","The recommendation for further research"],
        correct:1, explanation:"LLMs characteristically produce hedge-heavy, high-abstraction text that sounds authoritative but contains no falsifiable claims or specific expert insight." },

      // ── A2 Algorithmic Rhetoric ──
      { id:"A2_1", axis:1, a:1.1, b:-0.8, c:0.25,
        stimulus:"What rhetorical technique is PRIMARILY used in this AI-generated campaign message?",
        content:`"Every day, hardworking families struggle while the elite few grow richer. Only by standing together can we reclaim what was taken from us. The choice is clear: us or them."`,
        options:["Appeals to scientific authority","Us-vs-them framing with emotional populist language designed to polarize","Presenting statistical evidence","Asking the reader to consider multiple perspectives"],
        correct:1, explanation:"This text uses classic populist framing: a vague 'enemy elite,' emotional appeal to 'hardworking families,' and binary choice construction — hallmarks of algorithmically optimised political persuasion." },

      { id:"A2_2", axis:1, a:1.4, b:0.3, c:0.15,
        stimulus:"Which headline uses algorithmic rhetoric MOST aggressively?",
        content:null,
        options:["'Parliament Votes on Budget Amendment Today'","'New Budget Data Released by Finance Ministry'","'They're Hiding the Truth About Your Money — What the Budget REALLY Means'","'Finance Committee Reviews Annual Budget Proposals'"],
        correct:2, explanation:"Option C uses conspiracy framing ('hiding the truth'), direct address ('your money'), and capitalization for emotional amplification — all engagement-maximising techniques optimised by algorithmic content systems." },

      { id:"A2_3", axis:1, a:1.7, b:0.9, c:0.10,
        stimulus:"Why do AI recommendation algorithms tend to amplify emotionally extreme content over neutral, factual reporting?",
        content:null,
        options:["AI systems are programmed to prefer extreme views","Emotionally intense content generates more engagement signals (clicks, shares, dwell time) that optimization algorithms are trained to maximize","Neutral content is technically harder for AI to process","Regulators require platforms to show diverse content"],
        correct:1, explanation:"Engagement-based optimisation creates feedback loops where outrage, fear, and tribalism generate the metrics that maximise platform revenue — irrespective of informational quality." },

      { id:"A2_4", axis:1, a:2.1, b:1.4, c:0.10,
        stimulus:"Identify the MOST sophisticated persuasion technique in this AI-generated policy brief excerpt:",
        content:`"While some may argue that the evidence is mixed, leading researchers increasingly recognize that the consensus is shifting. Those who remain skeptical are often unfamiliar with the latest data."`,
        options:["Appeal to authority via 'leading researchers'","False consensus manufacture combined with delegitimization of dissent through implied ignorance","Use of hedging language ('some may argue')","Reference to 'latest data' without citation"],
        correct:1, explanation:"This combines fabricating a shifting consensus (without evidence) with framing sceptics as uninformed — subtly suppressing legitimate disagreement without engaging with it." },

      // ── A3 Synthetic Media ──
      { id:"A3_1", axis:2, a:1.0, b:-1.2, c:0.25,
        stimulus:"Which visual artifact is MOST commonly found in GAN-generated deepfake portrait images?",
        content:null,
        options:["Blurry background","Red-eye from camera flash","Asymmetric or distorted ears, irregular hair at edges, and unnaturally smooth skin texture","Slight overexposure in bright areas"],
        correct:2, explanation:"GAN models struggle with peripheral fine details — ears, hairlines, and teeth are common failure points. Skin also appears unnaturally smooth because the model averages over training data." },

      { id:"A3_2", axis:2, a:1.3, b:0.1, c:0.20,
        stimulus:"You receive a voice note from a colleague's number urgently asking you to transfer funds. What is the STRONGEST indicator it may be AI voice-cloned?",
        content:null,
        options:["The request is unusual and urgent — a social engineering pressure tactic — combined with no ambient background noise typical of AI-synthesised audio","Your colleague has never contacted you this way before","The amount requested is large","You haven't spoken in a while"],
        correct:0, explanation:"Urgency + unusual channel + clean audio with no background noise, breathing, or room acoustics are key composite indicators of AI voice synthesis used in fraud." },

      { id:"A3_3", axis:2, a:1.6, b:0.7, c:0.15,
        stimulus:"A viral video shows a politician saying something shocking. Before sharing, which technical check is MOST reliable for detecting AI video manipulation?",
        content:null,
        options:["Watch it multiple times to see if it looks real","Check if the politician's party has commented","Use a deepfake detection tool and examine unnatural blinking patterns, facial boundary artifacts, and temporal inconsistencies","See if major news channels have covered it"],
        correct:2, explanation:"Technical detection tools combined with artifact analysis (blinking frequency anomalies, lip-sync mismatches, boundary flickering) are far more reliable than social consensus checks." },

      { id:"A3_4", axis:2, a:2.0, b:1.6, c:0.10,
        stimulus:"Why is synthetic media detection becoming increasingly difficult?",
        content:null,
        options:["Detection tools are underfunded","People are insufficiently attentive","Generative and detection models co-evolve adversarially — as detectors improve, generators adapt to evade them, creating an arms race with no stable equilibrium","Synthetic media is only used by large organizations"],
        correct:2, explanation:"The GAN architecture is literally adversarial: the generator learns to fool the discriminator. As public detection tools improve, generative models are updated against them — ensuring permanent epistemic uncertainty." },

      // ── A4 Epistemic Calibration ──
      { id:"A4_1", axis:3, a:1.1, b:-0.9, c:0.25,
        stimulus:"An AI assistant states: 'Studies show that drinking coffee reduces Alzheimer's risk by 40%.' How should a well-calibrated person respond?",
        content:null,
        options:["Accept it — AI systems are usually accurate","Reject it — AI always fabricates health claims","Treat it as a plausible claim worth verifying in peer-reviewed sources, noting the specific percentage warrants particular scrutiny","Share it immediately as useful health information"],
        correct:2, explanation:"Epistemic calibration means neither blind acceptance nor reflexive rejection. Specific statistics from AI sources deserve heightened verification — they are precisely what hallucinating models confabulate most convincingly." },

      { id:"A4_2", axis:3, a:1.4, b:0.2, c:0.15,
        stimulus:"What BEST describes 'automation bias' in the context of AI literacy?",
        content:null,
        options:["Preference for automated tasks over manual ones","The tendency to over-trust AI system outputs and reduce critical scrutiny simply because the output comes from a computer system","AI systems becoming biased over time","Users becoming lazy because of automation"],
        correct:1, explanation:"Automation bias is the well-documented cognitive phenomenon where people assign unwarranted authority to machine outputs, reducing independent judgment — a core epistemic risk in human-AI interaction." },

      { id:"A4_3", axis:3, a:1.8, b:0.8, c:0.10,
        stimulus:"An AI gives contradictory answers to the same question on two occasions. What does this MOST reveal about the epistemic status of AI outputs?",
        content:null,
        options:["The AI has a bug requiring repair","You asked the question differently each time","AI outputs are probabilistic and context-sensitive — they represent likely tokens, not retrieved facts — so contradictory outputs can both sound authoritative","AI systems update their knowledge in real time"],
        correct:2, explanation:"Language models generate probable token sequences conditioned on context — they don't retrieve stored truths. This means consistency is not guaranteed, and contradictory outputs can each sound equally authoritative." },

      { id:"A4_4", axis:3, a:2.2, b:1.3, c:0.10,
        stimulus:"You ask an AI about a contested political topic and receive a confident, well-structured response. What is the MOST epistemically sophisticated concern?",
        content:null,
        options:["The AI might have political bias in its training data","The response might be too long","The confident, structured presentation may create an illusion of authoritative consensus on genuinely contested terrain, suppressing the legitimate uncertainty that democratic deliberation requires","The AI might lack up-to-date information"],
        correct:2, explanation:"AI systems present contested normative questions with the same confident register as factual claims, potentially foreclosing the deliberative ambiguity that democratic discourse requires." },

      // ── A5 AI Governance ──
      { id:"A5_1", axis:4, a:1.0, b:-1.1, c:0.25,
        stimulus:"Under the EU AI Act (2024), AI systems used in hiring decisions are classified as:",
        content:null,
        options:["Prohibited AI systems","High-risk AI systems requiring conformity assessment, transparency, and human oversight","Minimal-risk AI systems with no obligations","General purpose AI with limited regulation"],
        correct:1, explanation:"The EU AI Act classifies AI in employment (recruitment, promotion, task allocation) as High-Risk — requiring documentation, human oversight, and conformity assessments equivalent to CE-marking." },

      { id:"A5_2", axis:4, a:1.3, b:0.0, c:0.20,
        stimulus:"A citizen believes an AI algorithm unfairly denied their loan application. Under GDPR Article 22, what right do they have?",
        content:null,
        options:["The right to sue the AI company","The right not to be subject to solely automated decisions, and to request human review and a meaningful explanation","The right to have the AI retrained on their data","The right to compensation equal to the loan amount"],
        correct:1, explanation:"GDPR Article 22 grants the right to human review of automated decisions with significant effects, the right to express one's view, and the right to a meaningful explanation of the logic involved." },

      { id:"A5_3", axis:4, a:1.7, b:0.6, c:0.15,
        stimulus:"Why is 'explainability' (XAI) considered a governance requirement rather than merely a technical feature?",
        content:null,
        options:["Explainability makes AI systems faster","Regulators prefer simple models","Without explainability, affected individuals and oversight bodies cannot identify discrimination, challenge decisions, or hold organisations accountable — making accountability structurally impossible","Explainability is required for AI to be patented"],
        correct:2, explanation:"Explainability is a precondition for accountability. Opaque systems immunise organisations from scrutiny — even discriminatory decisions cannot be demonstrated without access to the system's reasoning." },

      { id:"A5_4", axis:4, a:2.0, b:1.2, c:0.10,
        stimulus:"India's Digital Personal Data Protection Act (DPDPA, 2023) establishes which governance principle directly relevant to AI systems processing citizen data?",
        content:null,
        options:["All AI systems in India must be open source","Foreign AI companies are prohibited from operating in India","Data principals (citizens) have rights to access, correct, and erase their personal data, and data fiduciaries must specify lawful purpose and obtain explicit consent","AI decisions in government services must be made by Indian citizens only"],
        correct:2, explanation:"DPDPA 2023 establishes consent-based processing, purpose limitation, and data principal rights (access, correction, erasure, grievance redress) — all directly applicable to AI systems using citizen data." },
    ];

    const INTERVENTIONS = [
      { axis:0, threshold:55, modules:["Verify Before You Share: Reverse image search and provenance tools","Citation Integrity: Spotting AI-hallucinated references in 3 steps","Metadata Forensics: Reading EXIF data and digital watermarks"] },
      { axis:1, threshold:50, modules:["Persuasion Architecture: Recognising dark patterns in algorithmic content","The Outrage Machine: How recommendation systems amplify emotion","Framing Analysis: Workshop on populist rhetoric detection"] },
      { axis:2, threshold:60, modules:["Deepfake Tells: Visual artifacts in GAN-generated faces and video","Voice Cloning Awareness: Detecting AI audio in 5 minutes","Media Authentication: Practical guide to FotoForensics and InVID"] },
      { axis:3, threshold:50, modules:["Calibrated Trust: A framework for AI output evaluation","Automation Bias: Why smart people over-trust machines","The Confidence Illusion: When AI certainty masks genuine uncertainty"] },
      { axis:4, threshold:45, modules:["AI Rights 101: GDPR Article 22 and the EU AI Act explained","DPDPA 2023: Your data rights as an Indian citizen","Participatory Governance: Engaging with AI policy consultations"] },
    ];

    // ════════════════════════════════════════════
    // SUB-COMPONENTS
    // ════════════════════════════════════════════

    function LiveBar({ value, color, animated }) {
      return (
        <div style={{ height:5, background:"rgba(255,255,255,0.08)", borderRadius:3, overflow:"hidden" }}>
          <div style={{
            height:"100%", width:`${value}%`, background:color, borderRadius:3,
            transition:"width 0.6s ease", animation: animated ? "barGrow 0.8s ease" : "none"
          }}/>
        </div>
      );
    }

    function EngineHUD({ thetas, bspWeights, activeAxis }) {
      return (
        <div style={{
          background:"#040B15", borderBottom:"1px solid #0F2035",
          padding:"10px 24px", display:"flex", gap:0, overflowX:"auto"
        }}>
          <div style={{ marginRight:20, display:"flex", alignItems:"center" }}>
            <span className="mono" style={{ fontSize:10, color:"#3A5A7A", letterSpacing:2 }}>ENGINE</span>
          </div>
          {AXES.map((ax, i) => (
            <div key={ax.id} style={{
              flex:1, minWidth:80, padding:"2px 10px",
              borderLeft:"1px solid #0F2035",
              opacity: i === activeAxis ? 1 : 0.38,
              transition:"opacity 0.3s"
            }}>
              <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:3 }}>
                <span style={{ fontSize:13 }}>{ax.icon}</span>
                <span className="mono" style={{ fontSize:11, color: i===activeAxis ? ax.color : "#5A7A9A", fontWeight:600 }}>
                  {thetaToScore(thetas[i])}
                </span>
              </div>
              <LiveBar value={thetaToScore(thetas[i])} color={ax.color} />
              <div className="mono" style={{ fontSize:9, color:"#3A5A7A", marginTop:3 }}>
                θ{thetas[i].toFixed(2)} W{bspWeights[i].toFixed(2)}
              </div>
            </div>
          ))}
        </div>
      );
    }

    // ════════════════════════════════════════════
    // INTRO SCREEN
    // ════════════════════════════════════════════
    function IntroScreen({ onStart }) {
      return (
        <div style={{
          minHeight:"100vh", display:"flex", alignItems:"center", justifyContent:"center",
          padding:24, position:"relative", overflow:"hidden"
        }}>
          {/* background grid */}
          <div style={{
            position:"fixed", inset:0, zIndex:0,
            backgroundImage:`
              linear-gradient(rgba(0,150,199,0.04) 1px, transparent 1px),
              linear-gradient(90deg, rgba(0,150,199,0.04) 1px, transparent 1px)
            `,
            backgroundSize:"40px 40px"
          }}/>
          <div style={{ position:"relative", zIndex:1, maxWidth:660, width:"100%", textAlign:"center" }}>
            <div className="fade-up" style={{ fontSize:64, marginBottom:8 }}>🧠</div>
            <div className="fade-up-1 mono" style={{ fontSize:11, letterSpacing:5, color:"#0096C7", textTransform:"uppercase", marginBottom:14 }}>
              Provisional Patent · AI Literacy Research · FISAT Business School
            </div>
            <h1 className="fade-up-2 serif" style={{ fontSize:48, fontWeight:700, color:"#EDF2F9", lineHeight:1.08, marginBottom:8, letterSpacing:-1 }}>
              AILA Scoring Engine
            </h1>
            <div className="fade-up-2" style={{ fontSize:18, color:"#5A8FAA", marginBottom:6, fontStyle:"italic" }}>
              Adaptive AI Literacy Assessment System
            </div>
            <div className="fade-up-2 mono" style={{ fontSize:12, color:"#2A4A6A", marginBottom:36 }}>
              IRT 3-PL · Behavioral Signal Processor · Literacy Fingerprint Vector
            </div>

            {/* Axis cards */}
            <div className="fade-up-3" style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:10, marginBottom:28, textAlign:"left" }}>
              {AXES.map(ax => (
                <div key={ax.id} style={{
                  background:"rgba(255,255,255,0.03)", border:`1px solid ${ax.color}33`,
                  borderRadius:10, padding:"12px 14px", display:"flex", alignItems:"center", gap:10
                }}>
                  <div style={{
                    width:36, height:36, borderRadius:8, background:ax.color+"22",
                    border:`1px solid ${ax.color}55`, display:"flex", alignItems:"center",
                    justifyContent:"center", fontSize:18, flexShrink:0
                  }}>{ax.icon}</div>
                  <div>
                    <div style={{ fontSize:13, fontWeight:600, color:"#C8D8E8" }}>{ax.name}</div>
                    <div className="mono" style={{ fontSize:10, color:"#3A6A8A" }}>{ax.id} · IRT-scored · BSP-weighted</div>
                  </div>
                </div>
              ))}
              <div style={{
                background:"rgba(255,255,255,0.02)", border:"1px solid rgba(255,255,255,0.06)",
                borderRadius:10, padding:"12px 14px", display:"flex", alignItems:"center", gap:10
              }}>
                <div style={{
                  width:36, height:36, borderRadius:8, background:"rgba(255,255,255,0.05)",
                  display:"flex", alignItems:"center", justifyContent:"center", fontSize:18, flexShrink:0
                }}>🔬</div>
                <div>
                  <div style={{ fontSize:13, fontWeight:600, color:"#C8D8E8" }}>Literacy Fingerprint</div>
                  <div className="mono" style={{ fontSize:10, color:"#3A6A8A" }}>5D LFV composite output</div>
                </div>
              </div>
            </div>

            {/* Stats row */}
            <div className="fade-up-4" style={{ display:"flex", gap:12, justifyContent:"center", marginBottom:28 }}>
              {[["20","Items"],["5","Axes"],["3-PL","IRT Model"],["BSP","Behavioral"]].map(([v,l]) => (
                <div key={l} style={{
                  background:"rgba(255,255,255,0.03)", border:"1px solid rgba(255,255,255,0.06)",
                  borderRadius:8, padding:"10px 14px", textAlign:"center"
                }}>
                  <div className="mono" style={{ fontSize:18, fontWeight:600, color:"#0096C7" }}>{v}</div>
                  <div style={{ fontSize:11, color:"#3A6A8A", marginTop:2 }}>{l}</div>
                </div>
              ))}
            </div>

            <div className="fade-up-5">
              <button className="btn-primary" onClick={onStart} style={{ width:"100%", fontSize:18, padding:"17px 40px" }}>
                Begin Assessment →
              </button>
              <div className="mono" style={{ fontSize:11, color:"#1A3A5A", marginTop:12 }}>
                ~10–12 minutes · Behavioral signals captured throughout
              </div>
            </div>
          </div>
        </div>
      );
    }

    // ════════════════════════════════════════════
    // ASSESSMENT SCREEN
    // ════════════════════════════════════════════
    function AssessmentScreen({ items, currentIdx, thetas, bspWeights, onAnswer, onNext, isLastItem }) {
      const [selected, setSelected] = useState(null);
      const [submitted, setSubmitted] = useState(false);
      const startRef = useRef(Date.now());
      const correctionsRef = useRef(0);
      const hesitationsRef = useRef(0);
      const lastHoveredRef = useRef(null);
      const [key, setKey] = useState(0);

      useEffect(() => {
        setSelected(null);
        setSubmitted(false);
        startRef.current = Date.now();
        correctionsRef.current = 0;
        hesitationsRef.current = 0;
        lastHoveredRef.current = null;
        setKey(k => k + 1);
      }, [currentIdx]);

      const item = items[currentIdx];
      const ax = AXES[item.axis];
      const progress = ((currentIdx) / items.length) * 100;

      function handleHover(i) {
        if (submitted) return;
        if (lastHoveredRef.current !== null && lastHoveredRef.current !== i) hesitationsRef.current++;
        lastHoveredRef.current = i;
      }
      function handleSelect(i) {
        if (submitted) return;
        if (selected !== null && selected !== i) correctionsRef.current++;
        setSelected(i);
      }
      function handleSubmit() {
        if (selected === null) return;
        const latency = Date.now() - startRef.current;
        const correct = selected === item.correct;
        const w = bspWeight(latency, correctionsRef.current, hesitationsRef.current);
        onAnswer(item, correct, latency, w);
        setSubmitted(true);
      }

      return (
        <div style={{ minHeight:"100vh", display:"flex", flexDirection:"column" }}>
          {/* Top bar */}
          <div style={{ background:"#040B15", borderBottom:"1px solid #0A1A2A", padding:"10px 24px", display:"flex", alignItems:"center", gap:14 }}>
            <span className="serif" style={{ fontWeight:700, color:"#5A8FAA", fontSize:15, whiteSpace:"nowrap" }}>🧠 AILA</span>
            <div style={{ flex:1, height:4, background:"#0A1A2A", borderRadius:2, overflow:"hidden" }}>
              <div style={{ height:"100%", width:`${progress}%`, background:`linear-gradient(90deg, ${ax.color}, ${ax.color}88)`, borderRadius:2, transition:"width 0.4s ease" }}/>
            </div>
            <span className="mono" style={{ fontSize:12, color:"#3A5A7A", whiteSpace:"nowrap" }}>{currentIdx+1} / {items.length}</span>
          </div>

          <EngineHUD thetas={thetas} bspWeights={bspWeights} activeAxis={item.axis} />

          {/* Content */}
          <div style={{ flex:1, maxWidth:740, margin:"0 auto", width:"100%", padding:"28px 20px 60px" }}>
            <div className="fade-up" key={`axis-${key}`} style={{
              display:"inline-flex", alignItems:"center", gap:8,
              background: ax.dark, border:`1px solid ${ax.color}55`,
              borderRadius:8, padding:"6px 14px", marginBottom:18
            }}>
              <span style={{ fontSize:16 }}>{ax.icon}</span>
              <span className="mono" style={{ fontSize:12, fontWeight:600, color:ax.color }}>{ax.id} · {ax.name}</span>
              <span className="mono" style={{ fontSize:10, color:ax.color+"88" }}>b={item.b.toFixed(1)} a={item.a.toFixed(1)}</span>
            </div>

            <h2 className="fade-up-1 serif" key={`q-${key}`} style={{ fontSize:21, color:"#D8E8F4", lineHeight:1.45, marginBottom:18, fontWeight:600 }}>
              {item.stimulus}
            </h2>

            {item.content && (
              <div className="fade-up-2" key={`c-${key}`} style={{
                background:"#030810", border:`1px solid ${ax.color}33`, borderLeft:`3px solid ${ax.color}`,
                borderRadius:8, padding:"14px 18px", marginBottom:22,
                fontStyle:"italic", color:"#8AAAC4", fontSize:14, lineHeight:1.7
              }}>
                {item.content}
              </div>
            )}

            <div className="fade-up-3" key={`opts-${key}`} style={{ display:"flex", flexDirection:"column", gap:10, marginBottom:22 }}>
              {item.options.map((opt, i) => {
                let bg = "rgba(255,255,255,0.03)";
                let border = "1px solid rgba(255,255,255,0.08)";
                let textColor = "#B0C4D8";
                let iconEl = null;
                if (submitted) {
                  if (i === item.correct) { bg="#082415"; border=`1px solid #2E7D32`; textColor="#81C784"; iconEl="✓"; }
                  else if (i === selected) { bg="#1A0608"; border=`1px solid #C62828`; textColor="#EF9A9A"; iconEl="✗"; }
                } else if (selected === i) {
                  bg = ax.dark; border=`1px solid ${ax.color}`; textColor="#EDF2F9";
                }
                return (
                  <div key={i} onMouseEnter={() => handleHover(i)} onClick={() => handleSelect(i)}
                    style={{
                      background:bg, border, borderRadius:10, padding:"13px 16px",
                      cursor:submitted?"default":"pointer", transition:"all 0.15s",
                      display:"flex", alignItems:"flex-start", gap:12
                    }}>
                    <div style={{
                      width:26, height:26, borderRadius:"50%", flexShrink:0, marginTop:1,
                      border:`2px solid ${submitted && i===item.correct ? "#2E7D32" : submitted && i===selected ? "#C62828" : selected===i ? ax.color : "#1A3A5A"}`,
                      background: submitted && i===item.correct ? "#2E7D32" : submitted && i===selected ? "#C62828" : selected===i ? ax.color : "transparent",
                      display:"flex", alignItems:"center", justifyContent:"center",
                      fontSize:13, color:"white", fontWeight:700
                    }}>
                      {iconEl || <span className="mono" style={{ fontSize:11, color: selected===i && !submitted ? "white" : "#3A6A8A" }}>{String.fromCharCode(65+i)}</span>}
                    </div>
                    <div style={{ fontSize:14, lineHeight:1.55, color:textColor, paddingTop:2 }}>{opt}</div>
                  </div>
                );
              })}
            </div>

            {submitted && (
              <div className="fade-up" style={{
                background:"#040B15", border:`1px solid ${ax.color}33`,
                borderRadius:10, padding:"14px 18px", marginBottom:20
              }}>
                <div className="mono" style={{ fontSize:10, fontWeight:600, color:ax.color, letterSpacing:2, marginBottom:8 }}>EXPLANATION</div>
                <p style={{ fontSize:14, color:"#8AAAC4", lineHeight:1.65 }}>{item.explanation}</p>
                <div style={{ display:"flex", gap:16, marginTop:10, flexWrap:"wrap" }}>
                  <span className="mono" style={{ fontSize:10, color:selected===item.correct?"#4CAF50":"#EF5350" }}>
                    {selected===item.correct ? "✓ Correct" : "✗ Incorrect"}
                  </span>
                  <span className="mono" style={{ fontSize:10, color:"#2A5A7A" }}>
                    θ → {thetas[item.axis].toFixed(3)}
                  </span>
                  <span className="mono" style={{ fontSize:10, color:"#2A5A7A" }}>
                    W_BSP → {bspWeights[item.axis].toFixed(2)}
                  </span>
                </div>
              </div>
            )}

            {!submitted ? (
              <button className="btn-primary" onClick={handleSubmit} disabled={selected===null}
                style={{
                  width:"100%", opacity:selected===null?0.4:1,
                  background:`linear-gradient(135deg, ${ax.color}, ${ax.color}99)`,
                  boxShadow:`0 4px 20px ${ax.color}44`
                }}>
                Submit Answer
              </button>
            ) : (
              <button className="btn-primary" onClick={onNext}
                style={{ width:"100%", background:"linear-gradient(135deg, #0A1628, #1A3050)", boxShadow:"none" }}>
                {isLastItem ? "View My Literacy Fingerprint →" : "Next →"}
              </button>
            )}
          </div>
        </div>
      );
    }

    // ════════════════════════════════════════════
    // RESULTS SCREEN
    // ════════════════════════════════════════════
    function ResultsScreen({ thetas, bspWeights, axisAnswerCounts, answeredItems, onRestart }) {
      const axisScores = thetas.map(thetaToScore);
      const lfv = computeLFV(axisScores, bspWeights);
      const overallScore = Math.round(lfv.reduce((a,b)=>a+b,0)/5);
      const grade = getGrade(overallScore);
      const gaps = INTERVENTIONS.filter(iv => lfv[iv.axis] < iv.threshold);
      const correct = answeredItems.filter(a=>a.correct).length;

      return (
        <div style={{ minHeight:"100vh" }}>
          {/* Header */}
          <div style={{
            background:"linear-gradient(180deg, #040B15, #070E1A)",
            borderBottom:"1px solid #0A1A2A", padding:"36px 24px", textAlign:"center"
          }}>
            <div style={{ fontSize:52 }}>🔬</div>
            <div className="mono" style={{ fontSize:11, letterSpacing:4, color:"#0077B6", textTransform:"uppercase", marginTop:10 }}>
              Assessment Complete · AILA Engine
            </div>
            <h1 className="serif" style={{ fontSize:32, color:"#EDF2F9", margin:"10px 0 4px" }}>
              Your AI Literacy Fingerprint
            </h1>
            <div className="mono" style={{ fontSize:12, color:"#2A5A7A" }}>
              {correct} / {answeredItems.length} correct · IRT 3-PL · BSP-weighted
            </div>
          </div>

          <div style={{ maxWidth:820, margin:"0 auto", padding:"28px 20px 60px" }}>

            {/* Overall */}
            <div className="card fade-up" style={{ textAlign:"center", padding:28, marginBottom:20, border:`1px solid ${grade.color}33` }}>
              <div className="mono" style={{ fontSize:11, letterSpacing:3, color:"#3A6A8A", marginBottom:10 }}>
                COMPOSITE LFV SCORE
              </div>
              <div className="score-num mono" style={{ fontSize:88, fontWeight:700, color:grade.color, lineHeight:1 }}>
                {overallScore}
              </div>
              <div className="serif" style={{ fontSize:22, color:grade.color, marginTop:4, fontWeight:600 }}>
                {grade.label}
              </div>
              <div className="mono" style={{ color:"#2A5A7A", fontSize:12, marginTop:10 }}>
                LFV = [{lfv.join(", ")}]
              </div>
            </div>

            {/* 5-axis breakdown */}
            <div className="card fade-up-1" style={{ padding:24, marginBottom:20 }}>
              <div className="mono" style={{ fontSize:11, letterSpacing:3, color:"#3A6A8A", marginBottom:18, textTransform:"uppercase" }}>
                Five-Axis Literacy Profile
              </div>
              {AXES.map((ax, i) => {
                const g = getGrade(lfv[i]);
                return (
                  <div key={ax.id} style={{ marginBottom:18 }}>
                    <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:6 }}>
                      <div style={{ display:"flex", alignItems:"center", gap:10 }}>
                        <span style={{ fontSize:18 }}>{ax.icon}</span>
                        <div>
                          <span style={{ fontSize:14, fontWeight:600, color:"#C8D8E8" }}>{ax.name}</span>
                          <span className="mono" style={{ fontSize:10, color:"#2A5A7A", marginLeft:8 }}>
                            θ={thetas[i].toFixed(2)} W={bspWeights[i].toFixed(2)}
                          </span>
                        </div>
                      </div>
                      <div style={{ textAlign:"right" }}>
                        <span className="mono" style={{ fontSize:20, fontWeight:700, color:g.color }}>{lfv[i]}</span>
                        <span className="mono" style={{ fontSize:11, color:"#2A5A7A", marginLeft:4 }}>/100</span>
                      </div>
                    </div>
                    <div style={{ height:8, background:"rgba(255,255,255,0.06)", borderRadius:4, overflow:"hidden" }}>
                      <div className="axis-bar" style={{
                        height:"100%", width:`${lfv[i]}%`,
                        background:`linear-gradient(90deg, ${ax.color}, ${ax.color}77)`,
                        borderRadius:4
                      }}/>
                    </div>
                    <div style={{ display:"flex", justifyContent:"space-between", marginTop:4 }}>
                      <span className="mono" style={{ fontSize:10, color:g.color }}>{g.label}</span>
                      {lfv[i] < (INTERVENTIONS[i]?.threshold||55) &&
                        <span className="mono" style={{ fontSize:10, color:"#FFA726" }}>⚠ Gap identified</span>}
                    </div>
                  </div>
                );
              })}
            </div>

            {/* BSP report */}
            <div className="card fade-up-2" style={{ padding:20, marginBottom:20 }}>
              <div className="mono" style={{ fontSize:11, letterSpacing:3, color:"#3A6A8A", marginBottom:14, textTransform:"uppercase" }}>
                📡 Behavioral Signal Processor Report
              </div>
              <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:10 }}>
                {AXES.map((ax,i) => (
                  <div key={ax.id} style={{
                    background:"rgba(0,0,0,0.3)", borderRadius:8, padding:"10px 14px",
                    border:`1px solid ${ax.color}22`
                  }}>
                    <div style={{ color:ax.color, fontSize:12, fontWeight:600, marginBottom:4 }}>{ax.icon} {ax.id}</div>
                    <div className="mono" style={{ color:"#8AAAC4", fontSize:11 }}>W_BSP = {bspWeights[i].toFixed(3)}</div>
                    <div className="mono" style={{ color:"#3A6A8A", fontSize:11 }}>Items: {axisAnswerCounts[i]}</div>
                  </div>
                ))}
              </div>
              <p style={{ marginTop:12, fontSize:13, color:"#4A7A9A", lineHeight:1.6 }}>
                W_BSP values close to 1.0 indicate fluent, confident responses. Values below 0.75 signal hesitation patterns — attenuating the LFV score to reflect genuine uncertainty rather than guessed-correct answers.
              </p>
            </div>

            {/* Interventions */}
            {gaps.length > 0 && (
              <div className="fade-up-3" style={{
                background:"rgba(255,167,38,0.05)", border:"1px solid rgba(255,167,38,0.2)",
                borderRadius:16, padding:20, marginBottom:20
              }}>
                <div className="mono" style={{ fontSize:11, letterSpacing:3, color:"#FFA726", marginBottom:16, textTransform:"uppercase" }}>
                  📚 Personalised Learning Interventions (IRS)
                </div>
                {gaps.map(gap => {
                  const ax = AXES[gap.axis];
                  return (
                    <div key={gap.axis} style={{ marginBottom:16 }}>
                      <div style={{ display:"flex", alignItems:"center", gap:8, marginBottom:8 }}>
                        <span style={{ fontSize:18 }}>{ax.icon}</span>
                        <span style={{ fontSize:14, fontWeight:600, color:ax.color }}>{ax.name}</span>
                        <span className="mono" style={{ fontSize:11, color:"#2A5A7A" }}>
                          Score {lfv[gap.axis]} &lt; threshold {gap.threshold}
                        </span>
                      </div>
                      {gap.modules.map((mod, mi) => (
                        <div key={mi} style={{
                          background:"rgba(0,0,0,0.3)", borderRadius:8, padding:"9px 14px",
                          marginBottom:6, display:"flex", alignItems:"center", gap:10,
                          border:`1px solid ${ax.color}22`
                        }}>
                          <div style={{
                            width:22, height:22, borderRadius:"50%", background:ax.color+"33",
                            display:"flex", alignItems:"center", justifyContent:"center",
                            fontSize:12, color:ax.color, flexShrink:0, fontFamily:"monospace"
                          }}>{mi+1}</div>
                          <div style={{ color:"#8AAAC4", fontSize:13 }}>{mod}</div>
                          <div className="mono" style={{ marginLeft:"auto", color:"#2A5A7A", fontSize:10, whiteSpace:"nowrap" }}>
                            Day {[1,3,7][mi]||7}
                          </div>
                        </div>
                      ))}
                    </div>
                  );
                })}
              </div>
            )}

            {/* Technical metadata */}
            <div className="fade-up-4" style={{
              background:"#020609", border:"1px solid #0A1A2A",
              borderRadius:12, padding:16, marginBottom:24, fontFamily:"'IBM Plex Mono', monospace", fontStyle:"normal"
            }}>
              <div style={{ color:"#0096C7", fontSize:11, marginBottom:8, letterSpacing:1 }}>// AILA Engine Output — Technical Metadata</div>
              <div style={{ fontSize:11, lineHeight:1.9, color:"#2A4A6A" }}>
                <div><span style={{ color:"#3A7A9A" }}>θ_vector  </span><span style={{ color:"#6A9FBF" }}>= [{thetas.map(t=>t.toFixed(3)).join(", ")}]</span></div>
                <div><span style={{ color:"#3A7A9A" }}>W_BSP     </span><span style={{ color:"#6A9FBF" }}>= [{bspWeights.map(w=>w.toFixed(3)).join(", ")}]</span></div>
                <div><span style={{ color:"#3A7A9A" }}>raw_scores</span><span style={{ color:"#6A9FBF" }}>= [{axisScores.join(", ")}]</span></div>
                <div><span style={{ color:"#0096C7" }}>LFV       </span><span style={{ color:"#5AB8DC" }}>= [{lfv.join(", ")}]  ← composite fingerprint</span></div>
                <div><span style={{ color:"#3A7A9A" }}>decay_λ   </span><span style={{ color:"#6A9FBF" }}>= 0.023  (50% weight at t=30 days)</span></div>
                <div><span style={{ color:"#3A7A9A" }}>model     </span><span style={{ color:"#6A9FBF" }}>= IRT 3-PL · EAP θ-update · BSP-weighted</span></div>
                <div><span style={{ color:"#3A7A9A" }}>accuracy  </span><span style={{ color:"#6A9FBF" }}>= {correct}/{answeredItems.length} ({Math.round(correct/answeredItems.length*100)}%)</span></div>
              </div>
            </div>

            <button className="btn-ghost" onClick={onRestart} style={{ width:"100%" }}>
              ↩ Retake Assessment
            </button>

            <div className="mono" style={{ textAlign:"center", marginTop:20, color:"#0F2035", fontSize:10 }}>
              AILA Scoring Engine · Provisional Patent · Prasanth · FISAT Business School · 2026
            </div>
          </div>
        </div>
      );
    }

    // ════════════════════════════════════════════
    // ROOT APP
    // ════════════════════════════════════════════
    function App() {
      const [phase, setPhase] = useState("intro");
      const [currentIdx, setCurrentIdx] = useState(0);
      const [thetas, setThetas] = useState([0,0,0,0,0]);
      const [bspWeights, setBspWeights] = useState([1,1,1,1,1]);
      const [axisAnswerCounts, setAxisAnswerCounts] = useState([0,0,0,0,0]);
      const [answeredItems, setAnsweredItems] = useState([]);

      function handleAnswer(item, correct, latency, w) {
        const ai = item.axis;
        setThetas(prev => {
          const n = [...prev];
          n[ai] = updateTheta(prev[ai], correct, item.a, item.b, item.c);
          return n;
        });
        setBspWeights(prev => {
          const n = [...prev];
          const cnt = axisAnswerCounts[ai];
          n[ai] = (prev[ai] * cnt + w) / (cnt + 1);
          return n;
        });
        setAxisAnswerCounts(prev => { const n=[...prev]; n[ai]++; return n; });
        setAnsweredItems(prev => [...prev, { id:item.id, axis:ai, correct, latency, w }]);
      }

      function handleNext() {
        if (currentIdx + 1 >= ITEM_BANK.length) { setPhase("results"); return; }
        setCurrentIdx(i => i + 1);
      }

      function handleRestart() {
        setPhase("intro");
        setCurrentIdx(0);
        setThetas([0,0,0,0,0]);
        setBspWeights([1,1,1,1,1]);
        setAxisAnswerCounts([0,0,0,0,0]);
        setAnsweredItems([]);
      }

      if (phase === "intro") return <IntroScreen onStart={() => setPhase("assessment")} />;
      if (phase === "assessment") return (
        <AssessmentScreen
          items={ITEM_BANK}
          currentIdx={currentIdx}
          thetas={thetas}
          bspWeights={bspWeights}
          onAnswer={handleAnswer}
          onNext={handleNext}
          isLastItem={currentIdx + 1 >= ITEM_BANK.length}
        />
      );
      if (phase === "results") return (
        <ResultsScreen
          thetas={thetas}
          bspWeights={bspWeights}
          axisAnswerCounts={axisAnswerCounts}
          answeredItems={answeredItems}
          onRestart={handleRestart}
        />
      );
    }

    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<App />);
  </script>
</body>
</html>
